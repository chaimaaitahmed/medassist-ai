<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedAssist AI - Professionnel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563EB; --primary-dark: #1E40AF;
            --bg: #F8FAFC; --surface: #FFFFFF;
            --text: #1E293B; --text-light: #64748B;
            --border: #E2E8F0; --radius: 12px;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; }
        
        .navbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .logo { font-weight: 700; color: var(--primary); font-size: 1.5rem; text-decoration: none; }
        .nav-links { display: flex; gap: 1.5rem; align-items: center; }
        .nav-links a { text-decoration: none; color: var(--text-light); font-weight: 500; transition: 0.2s; }
        .nav-links a:hover { color: var(--primary); }

        .container { max-width: 1000px; margin: 3rem auto; padding: 0 1rem; }
        .card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 2.5rem; box-shadow: var(--shadow); }
        
        .btn { display: inline-block; padding: 0.75rem 1.5rem; border-radius: 8px; font-weight: 600; cursor: pointer; border: none; transition: 0.2s; text-align: center; font-size: 1rem; text-decoration: none; }
        .btn-primary { background: var(--primary); color: white; width: 100%; }
        .btn-primary:hover { background: var(--primary-dark); }

        .form-group { margin-bottom: 1.25rem; }
        .form-group label { display: block; font-size: 0.875rem; font-weight: 600; margin-bottom: 0.5rem; color: var(--text); }
        input { width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 8px; font-size: 1rem; transition: 0.2s; }
        input:focus { outline: none; border-color: var(--primary); ring: 2px solid var(--primary); }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .alert { padding: 1rem; border-radius: 8px; background: #FEE2E2; color: #DC2626; margin-bottom: 1rem; font-size: 0.875rem; }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="/" class="logo">MedAssist AI</a>
        <div class="nav-links">
            {% if current_user.is_authenticated %}
                <a href="/emergency">🚨 Urgence</a>
                <a href="/dashboard">📊 Dashboard</a>
                <a href="/profile">👤 Profil</a>
                <a href="/logout" style="color: var(--danger);">Déconnexion</a>
            {% else %}
                <a href="/login">Connexion</a>
                <a href="/register">Inscription</a>
            {% endif %}
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
